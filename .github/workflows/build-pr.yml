name: Build PreTeXt Book (PR Check)

on:
  pull_request:
    branches:
      - main

# Minimal permissions for PR builds
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: oscarlevin/pretext-full

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: install deps
        run: pip install -r requirements.txt --break-system-packages

      - name: Build web target
        run: |
          pretext build web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pretext-build
          path: output/web
          retention-days: 7
