name: Build and Deploy PreTeXt Book

on:
  # Runs on pushes to master (after a PR is merged) to build and deploy
  push:
    branches: ["master"]

  # Runs on demand
  workflow_dispatch:

# Default minimal permissions; deploy job overrides as needed
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: oscarlevin/pretext-full

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: install deps
        run: pip install -r requirements.txt --break-system-packages

      - name: build deploy targets
        run: pretext build --deploys

      - name: stage deployment
        run: pretext deploy --stage-only

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/stage

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
